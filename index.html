<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Brand - Luxury </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
<meta name="description" content="Aethel - Luxury organic skincare and beauty. Pure, organic, and noble ingredients for your natural radiance.">
<link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com"> <!-- Тимчасова іконка вкладки -->
  
   <style>
        :root {
    --font-heading: 'Playfair Display', serif;
    --font-body: 'Montserrat', sans-serif;
    --brand-beige: #f5ebe0;
    --brand-nude: #e3d5ca;        
    --brand-dark: #463f3a;       
    --text-white: #ffffff;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #faf9f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); 
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(227, 213, 202, 0.3); 
        }

         nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--brand-dark);
            text-decoration: none;
        }
       
        nav ul {
            display: flex;
            gap: 40px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav ul li a {
    text-decoration: none;
    color: var(--brand-dark);
    font-family: var(--font-body);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 400;
    transition: all 0.3s ease;
        }

        nav ul li a:hover {
    color: var(--brand-nude);
        } 

        .cart-icon {
    display: flex;
    align-items: center;
    color: var(--brand-dark); 
    transition: color 0.3s ease;
}

.cart-icon:hover {
    color: var(--brand-nude);
}

.cart-icon svg {
    width: 22px;
    height: 22px;
}

.cart-icon:focus, .menu-toggle:focus {
    outline: 2px solid var(--brand-nude);
    outline-offset: 5px;
}

.banner {
position: relative;
background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('https://images.unsplash.com/photo-1764702806909-18e9de110271?q=80&w=1031&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat;
height: 80vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
color: white;
text-align: center;
}

.sidebar {
    position: fixed;
    top: 0;
    left: -300px; 
    width: 280px;
    height: 100vh;
    background: rgba(245, 235, 224, 0.7); 
    backdrop-filter: blur(15px); 
    -webkit-backdrop-filter: blur(15px);
    z-index: 2000;
    transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
    padding: 100px 40px;
    border-right: 1px solid rgba(255, 255, 255, 0.3);
}

.sidebar.active {
    left: 0;
}

.sidebar-content a {
    display: block;
    font-family: var(--font-body);
    text-decoration: none;
    color: var(--brand-dark);
    font-size: 0.75rem; /* Маленький шрифт - ознака люксу */
    margin-bottom: 30px;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 400;
    transition: 0.6s;
    opacity: 0.7;
}

.sidebar-content a:hover {
    opacity: 1;
    padding-left: 10px; 
    color: var(--brand-dark);
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.2);
    display: none;
    z-index: 1500;
}

.overlay.active {
    display: block;
}

.menu-toggle {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 25px;
    height: 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    z-index: 10;
       }

       .menu-toggle span {
    display: block;
    width: 100%;
    height: 1px;
    background-color: white; 
    transition: 0.3s;
}

      .menu-toggle:hover ~ #side-menu, #side-menu:hover {
    left: 0;
}

        .banner h1{
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-style: italic;
            letter-spacing: 1px;
        }
        .banner p{
            font-family: var(--font-body);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1rem;
        }
        .banner-btn {
   font-family: var(--font-body);
   text-transform: uppercase;
   letter-spacing: 1px;
   margin-top: 40px;
   padding: 15px 35px;
   border-radius: 30px;
   border: 1px solid var(--brand-beige);
   background-color: var(--brand-beige);
   color: var(--brand-dark);
   box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
   transition: 0.4s ease;
   cursor: pointer;
}
.banner-btn:hover{
   background-color: var(--brand-nude);
   border-color: var(--brand-nude);
   color: var(--brand-dark);
   transform: translateY(-3px);
   box-shadow: 0 6px 20px rgba(70, 63, 58, 0.15); 
}
        
        .container {
            max-width: 95%;
            margin: 0 auto;
        }

.category-card {
    position: relative;
    height: 480px;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    border-radius: 4px;
}
.category-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 1;
}
.category-card:hover::before {
    transform: scale(1.1);
}
.facecare::before { background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1670201202961-dce15b9e6939?q=80&w=929&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); }
.bodycare::before { background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1749766878223-6ceae855b28b?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); }
.haircare::before { background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1767953829433-1e405b6889de?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); }

.category-card h3 {
    position: relative;
    z-index: 2; 
    color: white;
    font-size: 2.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
    pointer-events: none; 
}

@media (max-width: 768px) {

    .banner h1 {
        font-size: 2.2rem;
        padding: 0 10px;
    }

    nav ul li:not(:last-child) {
        display: none;
    }

    .container[style*="grid-template-columns"] {
        grid-template-columns: 1fr !important;
        padding: 40px 15px !important;
    }

    .category-card {
        height: 350px;
    }

    .sidebar {
        width: 100%;
        left: -100%;
    }

    .menu-toggle {
        top: 25px;
        left: 20px;
    }
}

.main-footer {
    background-color: var(--brand-dark);
    color: var(--brand-beige);
    padding: 80px 0 40px;
    margin-top: 60px;
}

.footer-container {
    display: flex;
    justify-content: space-between;
    gap: 40px;
}

.footer-brand h2 {
    font-family: var(--font-heading);
    font-size: 2rem;
    margin-bottom: 10px;
}

.footer-brand p {
    font-family: var(--font-body);
    font-size: 0.8rem;
    opacity: 0.7;
    letter-spacing: 1px;
}

.footer-links {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.footer-links a {
    color: inherit;
    text-decoration: none;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: opacity 0.3s;
}

.footer-links a:hover { opacity: 0.6; }

.footer-newsletter p {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
}

.input-group {
    display: flex;
    border-bottom: 1px solid var(--brand-beige);
}

.footer-newsletter input {
    background: transparent;
    border: none;
    color: white;
    padding: 10px 0;
    width: 100%;
    font-family: var(--font-body);
    outline: none;
}

.footer-newsletter button {
    background: transparent;
    border: none;
    color: var(--brand-beige);
    cursor: pointer;
    padding: 0 10px;
}

.copyright {
    text-align: center;
    margin-top: 60px;
    font-size: 0.6rem;
    opacity: 0.4;
    letter-spacing: 2px;
}

@media (max-width: 768px) {
    .footer-container {
        flex-direction: column; 
        text-align: center;
        align-items: center;
    }
    
    .footer-newsletter input {
        text-align: center;
    }

    .input-group {
        width: 100%;
        max-width: 300px;
    }
}

</style>
</head>

<body>
    <header>
        <nav class="container">
            <div class="logo">Aethel</div>
            <ul>
                <li><a href="#products">Products</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
                <li>
                    <a href="cart" class="cart-icon" style="text-decoration: none; display: flex; align-items: center;">
               <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>   
                    </a>
                </li>
            </ul>
        </nav>
    </header>

<section class="banner">
        <div class="menu-toggle" id="menuBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div id="side-menu" class="sidebar">
    <div class="sidebar-content">
        <a href="#">New Arrivals</a>
        <a href="#">Special Offers</a>
        <a href="#">Skin</a>
        <a href="#">Makeup</a>
        <a href="#">Body</a>
        <a href="#">Hair</a>
        <a href="#">About</a>
    </div>
    <div id="overlay" class="overlay"></div>
</div>

        <h1> Organic in every touch</h1>
        <p>Discover our new products</p>
        <button class="banner-btn">Shop Now</button>
    </section>

    <section class="container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 60px 0;">
    <a href="#" class="category-card facecare">
        <h3 style="font-family: var(--font-heading);">Face</h3>
    </a>
    <a href="#" class="category-card bodycare">
        <h3 style="font-family: var(--font-heading);">Body</h3>
    </a>
    <a href="#" class="category-card haircare">
        <h3 style="font-family: var(--font-heading);">Hair</h3>
    </a>
</section>

<footer class="main-footer">
    <div class="footer-container container">
        <div class="footer-brand">
            <h2>Aethel</h2>
            <p>Pure. Organic. Noble.</p>
        </div>
        
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Shipping</a>
        </div>
        
        <div class="footer-newsletter">
            <p>Join our brand</p>
            <div class="input-group">
                <input type="email" placeholder="YOUR EMAIL">
            </div>
        </div>
    </div>
    <p class="copyright">© 2026 AETHEL BEAUTY. ALL RIGHTS RESERVED.</p>
</footer>

<script>
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
        }
    });
}, { threshold: 0.1 });

document.querySelectorAll('section').forEach(section => {
    section.style.opacity = '0';
    section.style.transform = 'translateY(30px)';
    section.style.transition = 'all 0.8s ease-out';
    observer.observe(section);
});
</script>

</body>
</html>
